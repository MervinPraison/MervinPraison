name: Update Trendshift Charts

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: profile-content-updates
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Trendshift charts
        run: node scripts/capture-trendshift.mjs

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add generated/trendshift-history.json generated/trendshift-all-language.svg generated/trendshift-all-language-dark.svg generated/trendshift-python.svg generated/trendshift-python-dark.svg
          git diff --staged --quiet || git commit -m 'chore: update Trendshift trending history charts'
          git pull --rebase origin main
          git push
